<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlayGamio | User Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL,GRAD,opsz@400,1,0,20" rel="stylesheet" />
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0b1120;
            color: #fff;
        }
        .font-display { font-family: 'Outfit', sans-serif; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Top Navigation -->
    <nav class="bg-slate-900 border-b border-slate-800 p-4">
        <div class="max-w-6xl mx-auto flex items-center justify-between">
            <a href="/" class="flex items-center gap-2">
                <span class="material-symbols-outlined text-indigo-500">sports_esports</span>
                <span class="font-display font-bold text-xl tracking-tight">PlayGamio</span>
            </a>
            <button id="logoutBtn" class="text-sm font-semibold text-red-400 hover:text-red-300">Log Out</button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow p-4 md:p-8">
        <div class="max-w-4xl mx-auto">
            <h1 class="text-4xl font-display font-bold mb-2">Welcome, <span id="dashUsername" class="text-indigo-400">Gamer</span>!</h1>
            <p class="text-slate-400 mb-8" id="dashEmail">Loading email...</p>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <!-- Profile Card -->
                <div class="bg-slate-800 rounded-2xl p-6 border border-slate-700 h-fit">
                    <h2 class="text-xl font-bold mb-4 flex items-center gap-2"><span class="material-symbols-outlined">person</span> Profile Info</h2>
                    <ul class="space-y-3 text-sm text-slate-300">
                        <li class="flex justify-between"><span>Member Since:</span> <span class="font-bold text-white">Today</span></li>
                        <li class="flex justify-between"><span>Games Played:</span> <span id="gamesCount" class="font-bold text-emerald-400">0</span></li>
                    </ul>
                </div>

                <!-- History -->
                <div class="md:col-span-2 bg-slate-800 rounded-2xl p-6 border border-slate-700">
                    <h2 class="text-xl font-bold mb-4 flex items-center gap-2"><span class="material-symbols-outlined">history</span> Play History</h2>
                    <div id="historyList" class="space-y-3">
                        <p class="text-slate-400 text-sm">Loading history...</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user'));

        if (!token || !user) {
            window.location.href = '/';
        }

        document.getElementById('dashUsername').textContent = user.username;
        document.getElementById('dashEmail').textContent = user.email;

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/';
        });

        // Load history from API
        async function loadHistory() {
            try {
                const res = await fetch('/api/user/history', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                
                const list = document.getElementById('historyList');
                document.getElementById('gamesCount').textContent = data.length || 0;

                if (!data || data.length === 0) {
                    list.innerHTML = '<p class="text-slate-400 text-sm">You haven\'t played any games yet.</p>';
                    return;
                }

                list.innerHTML = data.map(item => `
                    <div class="flex items-center justify-between p-3 bg-slate-900 rounded-xl border border-slate-700">
                        <div class="flex items-center gap-3">
                            <span class="material-symbols-outlined text-indigo-400">stadia_controller</span>
                            <span class="font-bold">${item.game_title || item.game_slug}</span>
                        </div>
                        <a href="/game.html?id=${item.game_slug}" class="text-sm font-semibold bg-indigo-600 hover:bg-indigo-500 px-4 py-1.5 rounded-lg transition-colors">Play Again</a>
                    </div>
                `).join('');
            } catch (err) {
                console.error(err);
            }
        }
        
        loadHistory();
    </script>
</body>
</html>
